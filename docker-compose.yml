services:
  gateway:
    build: ./gateway
    # En Coolify NO se publica el puerto con "ports": el proxy enruta el dominio
    # al puerto expuesto. (Para correr suelto en un VPS sin Coolify, cambia
    # "expose" por: ports: ["8080:8080"]).
    expose:
      - "8080"
    environment:
      - KOKORO_URL=http://kokoro:8880
      - PIPER_URL=http://piper:5000
    depends_on:
      - kokoro
      - piper
    volumes:
      - tts_data:/data        # persiste la voz por defecto que se fija desde el front
    restart: unless-stopped

  # Kokoro: imagen oficial CPU (API tipo OpenAI). El mejor balance calidad/peso.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    restart: unless-stopped
    expose:
      - "8880"

  # Piper: ultraligero, voz descargada en el build.
  piper:
    build: ./engines/piper
    restart: unless-stopped
    expose:
      - "5000"

volumes:
  tts_data:

